about_content: | # this will include new lines to allow paragraphs
  블록체인 개발자입니다. 이더리움 및 EOSIO를 활용한 DApp 개발 경험을 가지고 있습니다.

  새로운 기술 학습과 문제 해결 능력을 바탕으로 다양한 프로젝트에 참여하였으며,

  보안 및 블록체인 관련 알고리즘에 대한 이해를 바탕으로 안정적인 서비스를 제공합니다.

  백엔드 서버 개발에 대한 지속적인 학습을 이어가고 있습니다.

content:
  - title: Project # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: OmniOne Badge
        sub_title: 라온시큐어(주)
        caption: 2023. 00. - 2023. 00.
        link: https://badge.omnione.net
        quote: >
          블록체인 기반 OpenBadge 발행 서비스
        description: | # this will include new lines to allow paragraphs
          JSON 형식의 인증서 발행, 호스팅, 디스플레이 기능을 제공합니다.

          OpenBadge 2.0의 Blockcerts 확장을 구현했습니다.

          - 발행: 인증서의 Merkle root를 블록체인 트랜잭션에 기록하고 burn address로 전송하여 인증서를 발행합니다.

          - 검증: 블록체인 트랜잭션 데이터를 조회하여 인증서의 Merkle tree를 검증합니다.

          기술 스택에는 Alchemy Provider, NestJS 기반 RESTful API 서버, 그리고 NextJS 프론트엔드가 포함됩니다.

          compose 파일을 작성하여 AWS EC2 인스턴스에 Docker로 했습니다.

          다양한 환경(로컬, 개발, 테스트, 운영)에 빌드 및 배포 과정에서 휴먼 에러를 최소화 하기 위해, 자동화 스크립트를 작성하여 프로세스의 효율과 안정성을 제고했습니다.

      - layout: left
        title: OmniOne x SMATh NFT Swap
        sub_title: 라온시큐어(주)
        caption: 2023. 00. - 2023. 00.
        quote: >
          이더리움 NFT Swap 금 실물 교환 서비스
        description: | # this will include new lines to allow paragraphs
          AWS를 활용한 서비스 설계, 이더리움 NFT Swap 서버, 컨트렉트 개발 등을 수행했습니다.

      - layout: left
        title: OmniOne NFT Marketplace
        sub_title: 라온시큐어(주)
        caption: 2022. 00. - 2023. 00.
        link: https://nft.omnione.net
        quote: >
          NFT 마켓플레이스
        description: | # this will include new lines to allow paragraphs
          EOSIO 기반 블록체인인 OmniOne 블록체인 컨트렉트를 작성했습니다. (EOSIO-CPP)

          NFT 서비스를 위해 전송(+ 발행, 폐기)와 approve, setApproveForAll 기능을 구현했습니다.

          컨트렉트 결함 방지를 위해 테스트 코드를 작성했습니다. (커버리지 100%)

          백엔드 서버 개발자를 위해 xxx 분량의 README를 작성하고, 데이터 인코딩을 작성하여 전달 했습니다.

          운영을 위한 관리 기능을 구현하고, admin 웹 페이지를 작성하여 운영 담당자가 문제 상황에 사용하도록 가이드했습니다.

      - layout: left
        title: 트러스트키
        sub_title: 주식회사 트러스트키
        caption: 2016. 00. - 2020. 00.
        quote: >
          USB 보안 키 (FIDO 지문 인증 장치)
        description: | # this will include new lines to allow paragraphs
          지문 인식 기반 FIDO2 하드웨어 보안 장치를 개발하고 보안 인증을 진행했습니다.
          - ARM Cortex-M0/M3 기반 장치 펌웨어 개발
          - 부트로더 작성, 펌웨어 무결성 검증 및 데이터 암호화
          - HID 키보드/FIDO 장치 개발, 지문 인증 포팅 및 최적화
          - FIDO U2F/UAF/2/2.1, RFC 4226(HOTP)/6238(TOTP) 개발 및 보안 인증 획득

      - layout: left
        title: NPT-Sonicure
        sub_title: (주)오스테오시스
        caption: 2020. 00. - 2020. 00.
        quote: >
          디지털 array 컨트롤 기반 체외충격파치료(ESWT) 의료기기
        description: | # this will include new lines to allow paragraphs
          치료기 장비 제어를 위한 펌웨어 개발
          - AVR 펌웨어 개발: 통신 및 FPGA 제어, 전원 제어, 부트로더 개발
          - 장비 검증 및 테스트, 양산 이관

